services:
  connection-monitor:
    build: .
    container_name: connection-monitor
    ports:
      - "8810:8080"
    volumes:
      - ${DATA_DIR:-./data}:/data
    environment:
      - TZ=Europe/Madrid
      - DB_PATH=/data/connection-monitor.db
      - APP_ENV=production
      - STATIC_PATH=/app/apps/web/dist
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
    restart: unless-stopped
